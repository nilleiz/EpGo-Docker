name: Docker Hub publish
description: Build and push the EpGo image to Docker Hub for the selected branch tag.

inputs:
  image_name:
    description: Full Docker Hub image name.
    required: true
  dockerhub_username:
    description: Docker Hub username used for login.
    required: true
  dockerhub_token:
    description: Docker Hub access token or password used for login.
    required: true
  source_ref:
    description: Branch/tag/commit that the Dockerfile should clone for the EpGo source build.
    required: true
  image_tag:
    description: Docker image tag to publish.
    required: true

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        platforms: linux/amd64,linux/arm64
        build-args: |
          REF=${{ inputs.source_ref }}
        tags: ${{ inputs.image_name }}:${{ inputs.image_tag }}
