name: Release Go Project

on:
  push:
    branches:
      - master
    tags:
      - "v*"

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.21']
        os_arch:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go }}

      - name: Set binary and archive names
        id: set_names
        run: |
          if [ "${{ matrix.os_arch.goos }}" == "windows" ]; then
            echo "binary_name=epgo_${{ matrix.os_arch.goos }}_${{ matrix.os_arch.goarch }}.exe" >> $GITHUB_ENV
            echo "archive_name=epgo_${{ matrix.os_arch.goos }}_${{ matrix.os_arch.goarch }}.zip" >> $GITHUB_ENV
          else
            echo "binary_name=epgo_${{ matrix.os_arch.goos }}_${{ matrix.os_arch.goarch }}" >> $GITHUB_ENV
            echo "archive_name=epgo_${{ matrix.os_arch.goos }}_${{ matrix.os_arch.goarch }}.tar.gz" >> $GITHUB_ENV
          fi

      - name: Build project
        run: |
          GOOS=${{ matrix.os_arch.goos }} GOARCH=${{ matrix.os_arch.goarch }} go build -ldflags="-s -w" -o ${{ env.binary_name }}

      - name: Archive binary
        run: |
          if [ "${{ matrix.os_arch.goos }}" == "windows" ]; then
            zip ${{ env.archive_name }} ${{ env.binary_name }}
          else
            tar -czvf ${{ env.archive_name }} ${{ env.binary_name }}
          fi
      - name: Upload artifact for ${{ matrix.os_arch.goos }}-${{ matrix.os_arch.goarch }}
        uses: actions/upload-artifact@v4
        with:
          name: epgo-${{ matrix.os_arch.goos }}-${{ matrix.os_arch.goarch }}
          path: ${{ env.archive_name }}

  create_release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve_tag.outputs.release_tag }}
      version_tag: ${{ steps.resolve_tag.outputs.version_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: epgo-builds

      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG=$(sed -n 's/.*Version *= *"\(v[^"]*\)".*/\1/p' main.go | head -n1)
            if [[ -z "$TAG" ]]; then
              echo "Unable to determine Version from main.go" >&2
              exit 1
            fi
          fi
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_tag=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check for existing release
        id: check_release
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ steps.resolve_tag.outputs.release_tag }}';
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setOutput('exists', true);
            } catch (error) {
              core.setOutput('exists', false);
            }

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: |
            epgo-builds/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build and Push Docker Image
    needs: create_release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: nillivanilli0815/epgo
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.create_release.outputs.version_tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
